name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autobot-Windows
          path: dist/Autobot.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -r dist/Autobot.app dmg_content/ 2>/dev/null || cp dist/Autobot dmg_content/
          hdiutil create -volname "Autobot" -srcfolder dmg_content -ov -format UDZO dist/Autobot.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Autobot-macOS
          path: dist/Autobot.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Autobot-Windows
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: Autobot-macOS
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/Autobot.exe
            artifacts/macos/Autobot.dmg
