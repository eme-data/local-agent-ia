<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autobot — Configuration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            background: #16213e;
            border-radius: 16px;
            padding: 40px 32px;
            width: 360px;
            text-align: center;
            border: 1px solid #2a2a4a;
        }
        .robot { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #a0a0b0; font-size: 14px; margin-bottom: 28px; }
        label {
            display: block;
            text-align: left;
            font-size: 13px;
            color: #a0a0b0;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #1e2a4a;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: 'Fira Code', Consolas, monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #6c63ff; }
        input::placeholder { color: #555; }
        .help-link {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: #6c63ff;
            text-decoration: none;
        }
        .help-link:hover { text-decoration: underline; }
        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #5a52d5; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="robot">🤖</div>
        <h1>Bienvenue sur Autobot</h1>
        <p class="subtitle">Configure ta clé API Anthropic pour commencer</p>

        <label for="api-key">Clé API Anthropic</label>
        <input
            type="password"
            id="api-key"
            placeholder="sk-ant-..."
            autocomplete="off"
            spellcheck="false"
        >
        <a class="help-link" href="#" onclick="if(window.pywebview){window.pywebview.api.open_link('https://console.anthropic.com/')}">
            Obtenir une clé sur console.anthropic.com →
        </a>

        <p class="error" id="error-msg"></p>

        <button onclick="saveKey()" id="btn-save">Démarrer Autobot</button>
    </div>

    <script>
        const input = document.getElementById('api-key');
        const btn = document.getElementById('btn-save');
        const errorEl = document.getElementById('error-msg');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveKey();
        });

        async function saveKey() {
            const key = input.value.trim();
            if (!key) {
                showError('Entre ta clé API Anthropic.');
                return;
            }
            if (!key.startsWith('sk-ant-')) {
                showError('La clé doit commencer par "sk-ant-".');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enregistrement...';
            errorEl.style.display = 'none';

            try {
                const result = await window.pywebview.api.save_api_key(key);
                if (result === true) {
                    btn.textContent = 'Lancement...';
                } else {
                    showError(result || 'Erreur inconnue.');
                    btn.disabled = false;
                    btn.textContent = 'Démarrer Autobot';
                }
            } catch (e) {
                showError('Erreur : ' + e);
                btn.disabled = false;
                btn.textContent = 'Démarrer Autobot';
            }
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
